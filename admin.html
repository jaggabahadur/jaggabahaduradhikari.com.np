<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link rel="stylesheet" href="style.css">

<style>
.login-box{
max-width:400px;
margin:80px auto;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
text-align:center;
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
}

.login-box button{
width:100%;
padding:12px;
background:#1565c0;
color:white;
border:none;
font-size:18px;
border-radius:8px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="login-box">

<h2>Administrator Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script src="admin.js"></script>

</body>
</html>
